name: Deploy Frontend (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

# Cloudflare Pages가 GitHub에 직접 연결되어 자동 배포됨
# 이 워크플로우는 트리거 기록용으로만 유지
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Frontend deployment triggered via Cloudflare Pages GitHub integration
        run: echo "Cloudflare Pages will automatically deploy from the connected GitHub repo."
