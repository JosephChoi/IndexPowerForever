<div>
  <div class="container py-4">
    <div class="page-header">
      <h1 class="page-title"><i class="bi bi-piggy-bank me-2 text-success"></i>퇴직연금 시뮬레이터</h1>
      <p class="page-subtitle">원리금보장 상품 vs 인덱스 펀드, 퇴직 시 얼마나 차이날까요?</p>
    </div>

    <div class="row g-4">
      <div class="col-12 col-md-4">
        <div class="sim-panel">
          <div class="sim-panel-title">투자 조건</div>
          <div class="mb-3">
            <div class="sim-slider-label"><span class="label">현재 적립금</span><span class="value">{{ currentBalance.toLocaleString() }}만원</span></div>
            <input type="range" class="sim-slider" min="0" max="50000" step="500" v-model.number="currentBalance" @input="calculate" />
          </div>
          <div class="mb-3">
            <div class="sim-slider-label"><span class="label">월 납입액</span><span class="value">{{ monthlyContrib.toLocaleString() }}만원</span></div>
            <input type="range" class="sim-slider" min="10" max="500" step="10" v-model.number="monthlyContrib" @input="calculate" />
          </div>
          <div class="mb-3">
            <div class="sim-slider-label"><span class="label">운용 기간</span><span class="value">{{ years }}년</span></div>
            <input type="range" class="sim-slider" min="5" max="40" v-model.number="years" @input="calculate" />
          </div>
        </div>
      </div>

      <div class="col-12 col-md-8">
        <div class="card-base mb-4">
          <h6 class="fw-bold mb-3">자산 성장 추이</h6>
          <div class="chart-container" style="height:320px"><canvas id="retirementChart"></canvas></div>
        </div>
        <div class="row g-3">
          <div class="col-12 col-sm-4" v-for="(r, i) in results" :key="i">
            <div class="card-base text-center" :class="i > 0 ? 'card-highlight' : ''" :style="i > 0 ? 'background:rgba(40,167,69,0.04)' : ''">
              <div class="fw-bold mb-2">{{ r.label }}</div>
              <div class="fw-bold" :class="i === 0 ? '' : 'text-outperform'" style="font-size:1.5rem">
                {{ r.finalAmount.toLocaleString() }}<small class="fs-6 fw-normal">만</small>
              </div>
              <div class="text-muted small mt-1">수익금 {{ r.profit.toLocaleString() }}만원</div>
              <div class="text-success small fw-bold" v-if="i > 0">+{{ r.extra.toLocaleString() }}만원 더</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
