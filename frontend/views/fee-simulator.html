<div>
  <div class="container py-4">
    <h1 class="h3 fw-bold mb-1"><i class="bi bi-percent me-2 text-success"></i>비용 시뮬레이터</h1>
    <p class="text-muted mb-4">운용보수 차이가 복리로 얼마나 달라지는지 확인하세요</p>

    <div class="row g-4">
      <div class="col-12 col-md-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h6 class="fw-bold mb-3">투자 조건 설정</h6>
            <div class="mb-3">
              <label class="form-label small fw-medium">초기 투자금: {{ initialAmount.toLocaleString() }}만원</label>
              <input type="range" class="form-range" min="100" max="100000" step="100" v-model.number="initialAmount" @input="calculate" />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">연평균 수익률(세전): {{ annualReturn }}%</label>
              <input type="range" class="form-range" min="1" max="20" step="0.5" v-model.number="annualReturn" @input="calculate" />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-medium">투자 기간: {{ years }}년</label>
              <input type="range" class="form-range" min="5" max="50" v-model.number="years" @input="calculate" />
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-8">
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body">
            <h6 class="fw-bold mb-3">연도별 자산 추이</h6>
            <div class="chart-container" style="height:280px"><canvas id="feeChart"></canvas></div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered align-middle text-center">
            <thead class="table-dark">
              <tr>
                <th>시나리오</th><th>운용보수</th><th>최종 자산</th><th>총 수익금</th><th>손실 금액</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(r, i) in results" :key="i" :class="i === 0 ? 'table-success' : ''">
                <td class="fw-bold">{{ r.label }}</td>
                <td>{{ r.fee }}%</td>
                <td class="fw-bold">{{ r.finalAmount.toLocaleString() }}만원</td>
                <td :class="r.profit >= 0 ? 'text-success' : 'text-danger'">{{ r.profit.toLocaleString() }}만원</td>
                <td class="text-danger">{{ i === 0 ? '-' : '-' + r.loss.toLocaleString() + '만원' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
