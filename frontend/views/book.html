<div>
  <div class="container py-4">
    <div class="row g-5 align-items-start">
      <div class="col-12 col-md-4 text-center">
        <div class="bg-light rounded-3 p-5 mb-3">
          <i class="bi bi-book display-1 text-primary"></i>
          <h3 class="h5 fw-bold mt-3">이길 수 있는 투자만 하라</h3>
          <p class="text-muted small">2026년 4월 출간</p>
        </div>
        <a href="#" class="btn btn-primary btn-lg w-100 mb-2" target="_blank">
          <i class="bi bi-cart me-2"></i>구매하기
        </a>
        <a href="#" class="btn btn-outline-secondary w-100" target="_blank">
          <i class="bi bi-book me-2"></i>미리보기
        </a>
      </div>

      <div class="col-12 col-md-8">
        <h1 class="h3 fw-bold mb-1">이길 수 있는 투자만 하라</h1>
        <p class="text-muted mb-3">지수 투자의 과학적 근거와 실천 전략</p>
        <p class="mb-4">S&P 500과 NASDAQ 100 지수 투자가 왜 대부분의 액티브 투자를 이기는지, 데이터와 수식으로 증명합니다. 비용, 타이밍, 퇴직연금까지 투자의 모든 답은 지수에 있습니다.</p>

        <h5 class="fw-bold mb-3"><i class="bi bi-list-ol me-2"></i>목차</h5>
        <div class="accordion" id="tocAccordion">
          <div class="accordion-item" v-for="chapter in chapters" :key="chapter.id">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed fw-medium" type="button" data-bs-toggle="collapse" :data-bs-target="'#ch' + chapter.id">
                {{ chapter.title }}
              </button>
            </h2>
            <div :id="'ch' + chapter.id" class="accordion-collapse collapse" data-bs-parent="#tocAccordion">
              <div class="accordion-body text-muted small">
                {{ chapter.summary }}
                <div class="mt-2" v-if="chapter.link">
                  <a :href="chapter.link" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-play me-1"></i>관련 시뮬레이터
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
