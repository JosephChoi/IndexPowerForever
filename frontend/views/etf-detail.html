<div>
  <!-- 로딩 -->
  <div class="d-flex justify-content-center align-items-center" style="min-height:60vh" v-if="isLoading && !etfInfo && !compareData">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- 에러 -->
  <div class="container py-4" v-if="error">
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
      <button class="btn btn-sm btn-outline-danger ms-2" @click="loadData">재시도</button>
    </div>
  </div>

  <template v-if="etfInfo || compareData">

    <!-- ── ETF 헤더 배너 ── -->
    <div class="etf-header-banner">
      <div class="container py-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">

          <!-- 티커 + 풀네임 + 메타 -->
          <div>
            <div class="etf-ticker-badge">{{ ticker }}</div>
            <h1 class="etf-fullname mt-1 mb-2">{{ etfInfo?.name || '' }}</h1>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <span class="etf-meta-chip" v-if="etfInfo?.expenseRatio">
                <i class="bi bi-percent me-1"></i>운용보수 {{ (etfInfo.expenseRatio * 100).toFixed(2) }}%
              </span>
              <span class="etf-meta-chip" v-if="etfInfo?.aum">
                <i class="bi bi-bank me-1"></i>{{ formatAum(etfInfo.aum) }}
              </span>
              <span class="etf-meta-chip" v-if="etfInfo?.inceptionDate">
                <i class="bi bi-calendar3 me-1"></i>{{ etfInfo.inceptionDate }}
              </span>
            </div>
          </div>

          <button class="btn btn-outline-light btn-sm px-3" @click="navigateTo('/')">
            <i class="bi bi-arrow-left me-1"></i>검색으로
          </button>
        </div>

        <!-- 기간 + 벤치마크 선택 -->
        <div class="d-flex flex-wrap gap-2 mt-4 align-items-center">
          <div class="etf-period-group">
            <button
              class="etf-period-btn"
              :class="{ active: period === p }"
              v-for="p in ['1Y','3Y','5Y','10Y','max']"
              :key="p"
              @click="onPeriodChange(p)"
            >{{ p === 'max' ? '전체' : p }}</button>
          </div>
          <div class="etf-bench-group">
            <button
              class="etf-bench-btn spy"
              :class="{ active: benchmark === 'SPY' }"
              @click="onBenchmarkChange('SPY')"
            >S&P 500</button>
            <button
              class="etf-bench-btn qqq"
              :class="{ active: benchmark === 'QQQ' }"
              @click="onBenchmarkChange('QQQ')"
            >NASDAQ 100</button>
          </div>
          <span class="spinner-border spinner-border-sm text-white-50 ms-1" v-if="isLoading"></span>
        </div>
      </div>
    </div>

    <!-- ── 탭 ── -->
    <div class="etf-tab-bar">
      <div class="container">
        <div class="etf-tabs">
          <button class="etf-tab" :class="{ active: activeTab === 'comparison' }" @click="activeTab = 'comparison'">
            <i class="bi bi-graph-up me-1"></i>성과 비교
          </button>
          <button class="etf-tab" :class="{ active: activeTab === 'analysis' }" @click="activeTab = 'analysis'">
            <i class="bi bi-trophy me-1"></i>인덱스 승률
          </button>
          <button class="etf-tab" :class="{ active: activeTab === 'info' }" @click="activeTab = 'info'">
            <i class="bi bi-info-circle me-1"></i>종목 정보
          </button>
        </div>
      </div>
    </div>

    <!-- ── 탭 콘텐츠 ── -->
    <div class="container py-4">

      <!-- ===== 탭1: 성과 비교 ===== -->
      <div v-show="activeTab === 'comparison'">
        <template v-if="compareData">

          <!-- 핵심 지표 카드 4개 -->
          <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
              <div class="kpi-card">
                <div class="kpi-label">총수익률</div>
                <div class="kpi-value" :class="compareData.stats.etf.totalReturn >= 0 ? 'positive' : 'negative'">
                  {{ compareData.stats.etf.totalReturn > 0 ? '+' : '' }}{{ compareData.stats.etf.totalReturn.toFixed(1) }}%
                </div>
                <div class="kpi-vs">
                  S&P {{ compareData.stats.spy.totalReturn.toFixed(1) }}% /
                  NDX {{ compareData.stats.qqq.totalReturn.toFixed(1) }}%
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="kpi-card">
                <div class="kpi-label">CAGR (연평균)</div>
                <div class="kpi-value" :class="statClass('cagr','etf') ? 'positive' : ''">
                  {{ compareData.stats.etf.cagr.toFixed(2) }}%
                </div>
                <div class="kpi-vs">
                  S&P {{ compareData.stats.spy.cagr.toFixed(2) }}% /
                  NDX {{ compareData.stats.qqq.cagr.toFixed(2) }}%
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="kpi-card">
                <div class="kpi-label">MDD (최대낙폭)</div>
                <div class="kpi-value negative">{{ compareData.stats.etf.mdd.toFixed(1) }}%</div>
                <div class="kpi-vs">
                  S&P {{ compareData.stats.spy.mdd.toFixed(1) }}% /
                  NDX {{ compareData.stats.qqq.mdd.toFixed(1) }}%
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="kpi-card">
                <div class="kpi-label">샤프 비율</div>
                <div class="kpi-value" :class="statClass('sharpe','etf') ? 'positive' : ''">
                  {{ compareData.stats.etf.sharpe.toFixed(2) }}
                </div>
                <div class="kpi-vs">
                  S&P {{ compareData.stats.spy.sharpe.toFixed(2) }} /
                  NDX {{ compareData.stats.qqq.sharpe.toFixed(2) }}
                </div>
              </div>
            </div>
          </div>

          <!-- 누적 수익률 비교 차트 -->
          <div class="chart-card mb-3">
            <div class="chart-card-header">
              <span class="chart-card-title">누적 수익률 비교</span>
              <div class="chart-legend">
                <span class="legend-dot" style="background:#0d6efd"></span>{{ ticker }}
                <span class="legend-dot ms-3" style="background:#198754"></span>S&P 500
                <span class="legend-dot ms-3" style="background:#fd7e14"></span>NASDAQ 100
              </div>
            </div>
            <div class="chart-container" style="height:320px">
              <canvas id="comparisonChart"></canvas>
            </div>
          </div>

          <!-- 초과수익률 차트 -->
          <div class="chart-card">
            <div class="chart-card-header">
              <span class="chart-card-title">초과수익률 <span class="text-muted fw-normal small">({{ ticker }} - {{ benchmark }})</span></span>
            </div>
            <div class="chart-container" style="height:180px">
              <canvas id="excessChart"></canvas>
            </div>
          </div>

        </template>
      </div>

      <!-- ===== 탭2: 인덱스 승률 ===== -->
      <div v-show="activeTab === 'analysis'">
        <template v-if="compareData">

          <!-- 설명 배너 -->
          <div class="index-win-banner mb-4">
            <i class="bi bi-lightbulb me-2"></i>
            <span>
              <strong>인덱스 승률</strong>이란?
              {{ ticker }}를 매수해 일정 기간 보유했을 때, 같은 기간 <strong>{{ benchmarkName }}</strong>에 투자했다면 더 나았을 확률입니다.
              보유 기간이 길수록 인덱스의 승률이 높아지는 경향이 있습니다.
            </span>
          </div>

          <!-- 롤링 승률 카드 — 인덱스 관점 -->
          <div class="row g-3 mb-4">
            <div class="col-12 col-md-4" v-for="(data, period) in compareData.winAnalysis.rollingWin" :key="period">
              <div class="rolling-card" :class="indexWinRate(data) >= 50 ? 'win' : 'lose'">
                <div class="rolling-rate">{{ indexWinRate(data) }}<span class="rolling-unit">%</span></div>
                <div class="rolling-label">{{ period }} 보유 시 인덱스 승률</div>
                <div class="rolling-sub">{{ data.totalWindows - data.winCount }}승 / {{ data.totalWindows }}개 구간 중 인덱스가 우세</div>
              </div>
            </div>
          </div>

          <!-- 연도별 승패 요약 + 차트 — 인덱스 관점 -->
          <div class="chart-card mb-4">
            <div class="chart-card-header">
              <span class="chart-card-title">연도별 인덱스 vs {{ ticker }}</span>
              <div class="d-flex gap-2 align-items-center">
                <span class="badge-win">인덱스 승 {{ compareData.winAnalysis.loseCount }}</span>
                <span class="badge-lose">인덱스 패 {{ compareData.winAnalysis.winCount }}</span>
                <span class="text-muted small">인덱스 승률 {{ indexYearlyWinRate }}%</span>
              </div>
            </div>
            <div class="chart-container" style="height:240px">
              <canvas id="annualChart"></canvas>
            </div>
          </div>

          <!-- 연도별 수익률 테이블 -->
          <div class="chart-card">
            <div class="chart-card-header">
              <span class="chart-card-title">연도별 수익률 상세</span>
            </div>
            <div class="table-responsive">
              <table class="table detail-table mb-0">
                <thead>
                  <tr>
                    <th>연도</th>
                    <th>{{ benchmarkName }}</th>
                    <th>{{ ticker }}</th>
                    <th>인덱스 초과</th>
                    <th>결과</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="row in compareData.winAnalysis.yearlyReturns" :key="row.year">
                    <td class="fw-semibold">{{ row.year }}</td>
                    <td class="text-muted">{{ row.benchReturn > 0 ? '+' : '' }}{{ row.benchReturn.toFixed(1) }}%</td>
                    <td :class="row.etfReturn >= 0 ? 'text-outperform' : 'text-underperform'">
                      {{ row.etfReturn > 0 ? '+' : '' }}{{ row.etfReturn.toFixed(1) }}%
                    </td>
                    <td :class="row.diff <= 0 ? 'text-outperform fw-bold' : 'text-underperform'">
                      {{ (-row.diff) > 0 ? '+' : '' }}{{ (-row.diff).toFixed(1) }}%
                    </td>
                    <td>
                      <span class="result-badge" :class="!row.win ? 'win' : 'lose'">{{ !row.win ? '인덱스 승' : '인덱스 패' }}</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </template>
      </div>

      <!-- ===== 탭3: 종목 정보 ===== -->
      <div v-show="activeTab === 'info'">
        <template v-if="etfInfo">
          <div class="row g-4">
            <div class="col-12 col-md-6">
              <div class="chart-card h-100">
                <div class="chart-card-header"><span class="chart-card-title">기본 정보</span></div>
                <div class="info-table">
                  <div class="info-row"><span class="info-key">티커</span><span class="fw-bold">{{ etfInfo.ticker }}</span></div>
                  <div class="info-row"><span class="info-key">종목명</span><span>{{ etfInfo.name }}</span></div>
                  <div class="info-row" v-if="etfInfo.expenseRatio"><span class="info-key">운용보수</span><span>{{ (etfInfo.expenseRatio * 100).toFixed(2) }}%</span></div>
                  <div class="info-row" v-if="etfInfo.inceptionDate"><span class="info-key">설정일</span><span>{{ etfInfo.inceptionDate }}</span></div>
                  <div class="info-row" v-if="etfInfo.aum"><span class="info-key">운용자산</span><span>{{ formatAum(etfInfo.aum) }}</span></div>
                </div>
                <p class="text-muted small px-3 pb-3 mb-0" v-if="etfInfo.description">{{ etfInfo.description.slice(0, 300) }}...</p>
              </div>
            </div>
            <div class="col-12 col-md-6" v-if="etfInfo.topHoldings?.length">
              <div class="chart-card h-100">
                <div class="chart-card-header"><span class="chart-card-title">주요 보유 종목 TOP 10</span></div>
                <div class="px-3 pb-3">
                  <div v-for="holding in etfInfo.topHoldings.slice(0, 10)" :key="holding.ticker" class="mb-3">
                    <div class="d-flex justify-content-between small mb-1">
                      <span><span class="fw-bold me-1">{{ holding.ticker }}</span><span class="text-muted">{{ holding.name }}</span></span>
                      <span class="fw-semibold">{{ (holding.weight * 100).toFixed(1) }}%</span>
                    </div>
                    <div class="progress" style="height:5px;border-radius:3px">
                      <div class="progress-bar" style="background:#0d6efd" :style="{ width: (holding.weight * 100) + '%' }"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

    </div>
  </template>
</div>
