<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 580" width="400" height="580">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="100%" style="stop-color:#6610f2"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#28a745"/>
      <stop offset="100%" style="stop-color:#20c997"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="400" height="580" rx="8" fill="url(#bg)"/>

  <!-- 상단 악센트 바 -->
  <rect x="0" y="0" width="400" height="6" rx="3" fill="url(#accent)"/>

  <!-- 차트 영역 배경 -->
  <rect x="30" y="60" width="340" height="160" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- 그리드 -->
  <line x1="30" y1="100" x2="370" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="30" y1="140" x2="370" y2="140" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="30" y1="180" x2="370" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- 우상향 차트 라인 (S&P 500 스타일) -->
  <polyline points="40,200 80,195 120,185 160,190 200,170 240,155 280,140 320,110 360,80"
            fill="none" stroke="url(#chartLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 차트 아래 영역 채우기 -->
  <polyline points="40,200 80,195 120,185 160,190 200,170 240,155 280,140 320,110 360,80 360,220 40,220"
            fill="rgba(40,167,69,0.15)" stroke="none"/>

  <!-- 비교 라인 (액티브 펀드 스타일) -->
  <polyline points="40,200 80,198 120,192 160,195 200,188 240,185 280,182 320,175 360,165"
            fill="none" stroke="rgba(220,53,69,0.6)" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>

  <!-- 범례 -->
  <line x1="50" y1="235" x2="70" y2="235" stroke="#28a745" stroke-width="2"/>
  <text x="75" y="239" fill="rgba(255,255,255,0.6)" font-size="11" font-family="sans-serif">인덱스</text>
  <line x1="130" y1="235" x2="150" y2="235" stroke="rgba(220,53,69,0.6)" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="155" y="239" fill="rgba(255,255,255,0.6)" font-size="11" font-family="sans-serif">액티브 펀드</text>

  <!-- 구분선 -->
  <rect x="50" y="270" width="300" height="1" fill="url(#accent)" opacity="0.5"/>

  <!-- 부제 -->
  <text x="200" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="sans-serif" letter-spacing="3">왜 인덱스 투자만이 승산 있는 게임인가</text>

  <!-- 메인 타이틀 -->
  <text x="200" y="365" text-anchor="middle" fill="white" font-size="38" font-weight="bold" font-family="sans-serif">이길 수 있는</text>
  <text x="200" y="415" text-anchor="middle" fill="white" font-size="38" font-weight="bold" font-family="sans-serif">투자만 하라</text>

  <!-- 캐치프레이즈 -->
  <text x="200" y="455" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="13" font-family="sans-serif" font-style="italic">20년 통계가 증명한다. 승산 없는 게임을 멈춰라</text>

  <!-- 하단 구분선 -->
  <rect x="150" y="480" width="100" height="1" fill="rgba(255,255,255,0.2)"/>

  <!-- 저자 -->
  <text x="200" y="510" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="16" font-family="sans-serif">김대중 · 최근민 지음</text>

  <!-- 출판사 (더미) -->
  <text x="200" y="555" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="12" font-family="sans-serif">2026년 4월 출간</text>
</svg>
